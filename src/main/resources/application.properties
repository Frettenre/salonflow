server.port=8080

# PostgreSQL Connection Properties
spring.datasource.url=jdbc:postgresql://localhost:5432/salonflow
spring.datasource.username=postgres
spring.datasource.password=licenta

# Auto-update database tables matching our Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Simulated Email Config (Logs to console instead of trying to send a real email)
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=
spring.mail.password=
app.mail.from="SalonFlow Support" <noreply@salonflow.app>

# standard pool limits
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ADVANCED: Max lifetime of any connection in the pool (refresh connections every 30 minutes to clean up memory)
spring.datasource.hikari.max-lifetime=1800000

# ADVANCED: Automatically detects if a query is holding onto a connection for too long (leak detection)
spring.datasource.hikari.leak-detection-threshold=2000