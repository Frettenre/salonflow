<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="profile-view" id="view-profile" class="max-w-xl mx-auto py-6 hidden animate-fade-in">

    <button onclick="navigateTo('home')" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 text-xs font-black cursor-pointer mb-6">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span>Back to Dashboard</span>
    </button>

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-8 space-y-6">
        <div>
            <span class="text-[10px] font-black uppercase tracking-wider text-blue-600 bg-blue-50 border border-blue-100 px-2.5 py-0.5 rounded-full">Account Management</span>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight mt-1">My Personal Profile</h1>
            <p class="text-slate-400 text-xs font-semibold mt-0.5">Review or update your customer registration details below.</p>
        </div>

        <div id="profile-error" class="bg-rose-50 text-rose-700 border border-rose-100 px-4 py-3 rounded-xl text-xs font-bold hidden"></div>

        <form onsubmit="updateProfileSettings(event)" class="space-y-4">

            <div class="space-y-2 border-b border-slate-100 pb-4 text-center sm:text-left flex flex-col sm:flex-row items-center gap-4">
                <img id="profile-edit-avatar-preview" src="" alt="Avatar" class="w-16 h-16 rounded-full object-cover border-2 border-blue-500 shadow-sm">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Change Profile Avatar</label>
                    <div class="grid grid-cols-4 gap-2" id="profile-avatar-presets-grid"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">First Name</label>
                    <input type="text" id="profile-firstname-input" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:bg-white focus:border-blue-500 outline-none transition-all" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Surname</label>
                    <input type="text" id="profile-lastname-input" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:bg-white focus:border-blue-500 outline-none transition-all" required>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Phone Number</label>
                <input type="tel" id="profile-phone-input" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:bg-white focus:border-blue-500 outline-none transition-all" required>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Birthday</label>
                <input type="date" id="profile-birthday-input" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold cursor-pointer focus:bg-white outline-none">
            </div>

            <div class="pt-4 border-t border-slate-100 flex gap-3">
                <button type="button" onclick="navigateTo('home')" class="w-1/2 py-3 border border-slate-200 text-slate-500 font-bold text-xs uppercase rounded-xl">Cancel</button>
                <button type="submit" class="w-1/2 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-wider rounded-xl shadow-md transition-all">Save Changes</button>
            </div>
        </form>
    </div>
</div>
</html>
