<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="partner-views" class="space-y-8">

    <div id="view-partner" class="space-y-8 hidden">
        <div class="flex items-center justify-between border-b border-slate-200 pb-4">
            <div class="flex items-center gap-4">
                <div>
                    <span class="text-[10px] font-black uppercase tracking-wider text-blue-600 bg-blue-50 border border-blue-100 px-2.5 py-0.5 rounded-full">Partner Workspace</span>
                    <h1 id="partner-salon-name" class="text-2xl font-black text-slate-900 tracking-tight mt-1">My Partner Dashboard</h1>
                </div>
                <select id="partner-salon-select" onchange="switchPartnerSalon(this.value)" class="bg-slate-150 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold text-slate-700 outline-none cursor-pointer hover:bg-slate-200 transition-colors hidden mt-3"></select>
            </div>
            <button onclick="navigateTo('home')" class="px-4 py-2 border border-slate-200 text-slate-600 hover:bg-slate-50 text-xs font-black rounded-xl">Customer Mode</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm space-y-4">
                <h3 class="font-extrabold text-sm text-slate-800 uppercase tracking-wider">Configure Services</h3>
                <form onsubmit="addService(event)" class="space-y-3">
                    <input type="text" id="service-name-en" placeholder="Service Name (EN)" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-bold" required>
                    <input type="text" id="service-name-ro" placeholder="Nume Serviciu (RO)" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-bold" required>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="service-price" placeholder="Price (RON)" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-bold" required>
                        <input type="number" id="service-duration" placeholder="Duration (Min)" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs font-bold" required>
                    </div>
                    <button type="submit" class="w-full py-2 bg-slate-900 text-white font-bold text-xs uppercase rounded-lg">Add Service</button>
                </form>
                <div id="partner-services-list" class="divide-y divide-slate-100 pt-2 max-h-60 overflow-y-auto custom-scroll"></div>
            </div>

            <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-extrabold text-sm text-slate-800 uppercase tracking-wider">Block Calendar Hours</h3>
                    <div class="flex gap-2">
                        <button onclick="blockWholeDay()" class="bg-amber-50 text-amber-800 hover:bg-amber-100 border border-amber-200 text-[10px] font-black uppercase tracking-wider px-2.5 py-1.5 rounded-lg transition-all cursor-pointer">Block Whole Day</button>
                        <button onclick="openCustomBlockModal()" class="bg-slate-900 hover:bg-black text-white text-[10px] font-black uppercase tracking-wider px-2.5 py-1.5 rounded-lg transition-all cursor-pointer">Custom Range</button>
                    </div>
                </div>
                <div class="space-y-3">
                    <input type="date" id="block-slot-date" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-xs font-bold cursor-pointer">
                    <div class="grid grid-cols-3 gap-1.5" id="block-slots-hours-grid"></div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm space-y-4">
                <h3 class="font-extrabold text-sm text-slate-800 uppercase tracking-wider">Customer Database</h3>
                <div id="partner-customers-list" class="divide-y divide-slate-100 max-h-80 overflow-y-auto custom-scroll pr-1"></div>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm space-y-4">
            <h3 class="font-extrabold text-sm text-slate-800 uppercase tracking-wider">Active Bookings Log</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                    <tr class="border-b border-slate-100 text-slate-400 font-bold uppercase tracking-wider text-[10px]">
                        <th class="py-3 px-2">Date & Time</th>
                        <th class="py-3 px-2">Customer</th>
                        <th class="py-3 px-2">Treatment</th>
                        <th class="py-3 px-2 text-center">Action</th>
                    </tr>
                    </thead>
                    <tbody id="partner-bookings-table" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</html>
